name: Screenshot Tests for Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  screenshot-test:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.15"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Project
        run: npm run build

      - name: Run Screenshot Tests
        run: npm run screenshot:test
        env:
          CI: true

      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshot-diff-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Comment on PR with Results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let comment = '## 📸 Screenshot Test Results\n\n';
            
            // Check if test results exist
            const testResultsPath = 'test-results';
            if (fs.existsSync(testResultsPath)) {
              const testResults = fs.readdirSync(testResultsPath);
              
              if (testResults.length > 0) {
                comment += '⚠️ **Visual changes detected in this dependency update!**\n\n';
                comment += 'Screenshots have been captured and uploaded as artifacts. Please review the visual changes to ensure they are expected.\n\n';
                comment += `📎 Check the [screenshot artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed comparison.\n\n`;
                comment += '### Next Steps:\n';
                comment += '1. Download and review the screenshot artifacts\n';
                comment += '2. If changes are expected, update the baseline screenshots\n';
                comment += '3. If changes are unexpected, investigate the dependency update\n';
              } else {
                comment += '✅ **No visual changes detected!**\n\n';
                comment += 'The dependency update does not appear to have affected the UI. All screenshot tests passed.\n';
              }
            } else {
              comment += '✅ **Screenshot tests completed successfully!**\n\n';
              comment += 'No visual regressions detected from this dependency update.\n';
            }
            
            comment += '\n---\n*This comment was automatically generated by the screenshot test workflow.*';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  approve-dependabot:
    name: Auto-approve Dependabot PRs
    runs-on: ubuntu-latest
    needs: screenshot-test
    if: github.actor == 'dependabot[bot]' && success()
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Approve PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ Screenshot tests passed - no visual regressions detected. Auto-approving this dependency update.'
            });